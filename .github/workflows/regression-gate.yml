name: Regression Gate

on:
  push:
    branches: [ "**" ]
  pull_request:

jobs:
  regressions:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run regression gate
        run: |
          python regressions_report.py
      - name: Upload regression artifacts
        uses: actions/upload-artifact@v4
        with:
          name: regression-reports
          path: artifacts/regressions

