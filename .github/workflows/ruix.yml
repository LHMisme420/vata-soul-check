name: RU∞X Integrity CI

on:
  push:
  pull_request:

jobs:
  ruix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run RU∞X suite
        run: |
          python -m tools.canonical_pack
          python -m experiments.hti_threshold_sweep
          python -m experiments.ncr_threshold_sweep
          python -m experiments.bei_threshold_sweep
          python -m experiments.adversarial_mutation_suite
          python -m experiments.pick_thresholds

      - name: Brittleness gate
        run: |
          python - << 'PY'
          import csv
          LIMIT = 0.05
          bad = []
          with open("out/brittleness_index.csv", newline="", encoding="utf-8") as f:
              for r in csv.DictReader(f):
                  v = float(r["brittleness_index"])
                  if v > LIMIT:
                      bad.append((r["primitive"], v))
          if bad:
              raise SystemExit("Brittleness gate failed: " + ", ".join(f"{p}={v:.4f}" for p,v in bad))
          print("✅ Brittleness gate passed.")
          PY
